<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC 5m Bot — redirecting to the live dashboard…</title>
<link rel="canonical" href="live.html">
<meta http-equiv="refresh" content="0; url=live.html">
<style>
  html,body{margin:0;height:100%}
  body{background:#12161c;color:#e8ebef;font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:24px}
  .b{color:#f7931a}
  .spin{width:34px;height:34px;border:3px solid #2a323d;border-top-color:#f7931a;border-radius:50%;animation:s 0.8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  a{color:#6fb2ff;text-decoration:none;border-bottom:1px dashed #6fb2ff}
  a:hover{border-bottom-style:solid}
  .mut{color:#8b96a3;font-size:13px}
</style>
</head>
<body>
  <div class="spin"></div>
  <div><span class="b">₿</span> Taking you to the <b>live dashboard</b>…</div>
  <div class="mut">Not moving? <a href="live.html">Open the live dashboard →</a></div>
  <div class="mut">Looking for the old in-browser trader? <a href="trader.html">It's here →</a></div>
<script>location.replace("live.html");</script>
</body>
</html>
